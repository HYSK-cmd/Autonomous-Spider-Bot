# PPO Hyperparameters
learning_rate: 1.0e-4 #3.0e-4
actor_learning_rate: 1.0e-4 #learning_rate
critic_learning_rate: 3.0e-4 #learning_rate
gamma: 0.98 #0.99              
gae_lambda: 0.95         
clip_epsilon: 0.2        
entropy_coef: 0.005 #0.01
n_epochs: 6 #10
batch_size: 64
max_grad_norm: 0.5
n_rollout_steps: 1024 #2048
target_kl: 0.02
log_ratio_clip: 10.0